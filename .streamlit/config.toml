# Streamlit theme — neutral, projector-friendly, not flashy.
# Primary colour is matplotlib's default tab:blue (#1F77B4). Looks like
# every academic plot in the thesis. Body font is sans-serif so projector
# rendering at 1280x720 stays legible.

[theme]
base = "light"
primaryColor = "#1F77B4"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
# Default port is fine. headless=true so streamlit run doesn't try to
# auto-open a browser when running on a server (relevant during deploy).
headless = true
runOnSave = false

[browser]
gatherUsageStats = false
